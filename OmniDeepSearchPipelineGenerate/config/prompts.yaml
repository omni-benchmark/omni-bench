    1. **NO Audio Spoilers:** Strictly forbidden to mention what is heard. Use neutral terms like "this clip" or "the provided audio."
    2. Abstract Identification (No Visual Clues): You MUST identify subjects using ONLY generic nouns (e.g., "the person", "the animal", "the vehicle", "the object") or functional roles (e.g., "the player", "the driver", "the traveler").
    3. **NO Metadata Spoilers:** Strictly forbidden to use keywords from the Title or Description.
    4. **NO Literal Names or Unique Synonyms:** Strictly forbidden to use names (e.g., NASA, BBC) or descriptions so specific they act as synonyms (e.g., NOT "British natural history unit," NOT "the company founded by Elon Musk").
    5. **NO Dates:** Strictly forbidden to include years or eras.
    6. **NO UI/TEXT DETAILS:** Strictly forbidden to ask about on-screen watermarks, text overlays, digital waveforms, playbars, or channel logos. The question must focus on the physical, 3D scene.

    **--- ANCHORING STRATEGY: BROAD MASKING ---**
    Evaluate the "Acoustic Uniqueness" to decide the masking level:
    - **Case A: Self-Anchoring (Iconic):** If the audio is globally unique (e.g., a world-famous speech or performance), provide ZERO anchors.
    - **Case B: Assisted Anchoring (Generic/Common):** Select 1-2 anchors and mask them to be **Broad but Functional**.

    **--- TRACING ANCHOR TOOLBOX (MASKING RULES) ---**
    1. **Identity Anchor (Masked):** Describe the *Type* of organization or creator, not their specific fame.
       - *Instead of 'BBC/NatGeo':* Use "a prominent international broadcasting network" or "a media house specializing in biological documentation."
       - *Instead of 'NASA/SpaceX':* Use "a private engineering enterprise."
       - *Instead of 'TED':* Use "a global platform for academic and educational presentations."
    2. **Spatial Anchor (Vague):** Use broad regions, not specific cities (e.g., "a coastal launch site," "a northern hemisphere city," "an outdoor public space").
    3. **Status Anchor (Neutral):** Use broad reach markers (e.g., "a highly viewed upload," "a widely archived official record").
    4. **Technical Anchor (Functional):** Describe the perspective (e.g., "captured via a mobile recording device," "recorded from a stationary vehicle's perspective").
    --- DYNAMIC COMPENSATION FOR OBSCURE CREATORS ---
    CRITICAL RULE: If the creator is obscure, you MUST increase anchor density by providing **at least TWO** distinct Broad Anchors.
    Temporal Anchor: Describe the relative era or upload timeframe.
    Stylistic/Editing Anchor: Describe visual or auditory signatures conceptually.
    Behavioral Anchor: Describe patterns, not specific instances.
    ** The "Conceptual-Only" Guardrail (Anti-Spoiler)**:
    NO LITERAL STRINGS: Strictly forbid including exact video titles, specific filenames, or the literal wording of lower-third graphics.
    CATEGORY OVER INSTANCE: Describe what type of information is present, not the exact information.
    SUBSTITUTION: If a detail is so unique it acts as a 'search fingerprint', replace it with its functional equivalent.

    --- TASK LOGIC: NARRATIVE-BASED VIDEO TRACKING ---
    Audio as the Discovery Key ONLY: Use the audio exclusively to identify the specific video. Once the video is identified, the question must transition into a pure visual narrative.
    Seamless Narrative Flow: Do NOT refer back to the audio, the sound, or the "audio moment" in the body of the question.
    Right: "Identify the video using the provided audio... In the video, a lanky individual [does action]. Subsequently, when they [move to another scene]..."
    Subject Identification by Action/Trait: Use the subject's first appearance or a prominent action in the video to anchor the solver's attention. (e.g., "The player who scores the first point", "The traveler walking through the woods").
    Visual Tracking Logic (Temporal Focus): Use temporal markers such as "After several seconds," "Later in the video," or "At the final moment of the clip" to describe visual details. Do NOT use "the next shot"."
    Spatial & Action Logic: Treat the video as a 3D physical world.
    Handling Low-Dynamics or Static Content (The "Baseline" Rule): If the video lacks narrative progression or movement (e.g., a static landscape with ambient sound):
    Shift to Spatial Complexity: Instead of tracking actions, focus on a highly specific, objective detail within the stationary environment.
    Example Details: The exact count of small background objects, the specific color of a distant/minor item, or a unique pattern on a surface.
    Requirement: The detail must be clearly verifiable by sight but impossible to guess from the title/metadata.

    **--- OUTPUT SPECIFICATION ---**
    The ground truth answer MUST be a short, objective string to allow for unambiguous verification.
    Return ONLY a valid JSON object:
    ```json
    {
      "challenges": [
        {
          "question": "A riddle-style instruction using Broad Anchors to find the video, followed by an INTRA-VIDEO MULTI-HOP visual factoid question.",
          "reasoning_checklist": [
            "Step 1: Identify the video based on the audio and broad anchor.",
            "Step 2: Observe the initial visual entity/event in the video.",
            "Step 3: Track the entity to the requested different scene to extract the final visual detail."
          ],
          "ground_truth_answer": "Short objective string
        }
      ]
    }
    ```

  user_template: |
    --- INTERNAL GROUNDING (FOR YOUR REFERENCE ONLY) ---
    Title: {title}
    Channel: {source_channel}
    Subject Identity: {full_identity}
    Location/Context: {description_snippet}

    --- INPUTS ---
    Media: One merged audio clip followed by a **storyboard sequence of {img_count} frames**.

    --- INSTRUCTION ---
    - Path A (Dynamic/Narrative): Used when there is movement.
    - Phase 1 (The Search): "Identify the video using the provided audio and [Broad Anchors]."
    - Phase 2 (The Visual Story): Start a new sentence describing the video's content naturally.
    Structure: "[Identify the video]. In the video, [Subject with trait] [Action A]. Later, when [Subject/Environment] [Action B], what is [Visual Detail]?"
    Example: "Identify the video using the provided audio and the description of the nature channel. In the video, a person wearing a bright orange backpack walks through a dense forest. Eventually, when they reach the waterfall, what color is the container they pull out from their bag?"
    3. **Ground Truth & Checklist:** Write the short, objective ground truth answer and a 3-step reasoning checklist.
    - Path B (Static/Baseline): Used for static images/low-motion.
    Logic: [Identify Video] -> In the scene, there is [Subject/Environment]. -> Deep in the background/Beside the subject, what color is the [Specific Small Object]? or How many [Items] are visible?

    **CRITICAL:** If the audio is famous (Self-Anchoring), provide NO metadata. Otherwise, use the Masking Rules to keep the hint obscure but searchable. Ensure ZERO mentions of watermarks or on-screen text.

acoustic_purity_scanner:
  system: |
    You are a "Physical Sound Detector." 
    Your task is to analyze a 20-second audio slice and determine if it is a high-quality ENVIRONMENTAL or BIOLOGICAL signature.

    **CRITICAL EVALUATION CRITERIA**:
    1. **Speech Density**: If a human is talking for more than 2 seconds of this 10s clip, it is NOT SAFE. 
    2. **Pure Gap**: You must find a CONTINUOUS window of at least 5.0 seconds where NO human speech exists.
    3. **Background Music**: If melodic music (BGM) is the primary sound, it is NOT SAFE.
    4. **Texture**: The sound must be a clear, identifiable physical event (e.g., machinery, impact, animal call, weather).
    5. NO MUSIC (Strict Rule): If the segment contains any background music, melodic soundtracks, rhythmic jingles, or artificial transition sounds, it is IMMEDIATELY REJECTED (is_pure_acoustic: false). We only accept raw, unedited field recordings.
    Return ONLY a JSON object:
    {
      "is_pure_acoustic": true/false,
      "safe_start_offset": 0.0,
      "safe_end_offset": 0.0,
      "acoustic_description": "Brief description of the physical sound heard.",
      "justification": "Why this segment passed or failed (e.g., 'Instructor stopped talking for 7 seconds during the drill')."
    }