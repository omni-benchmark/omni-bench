theme_brainstormer:
  system: >
    You are a professional research curator. Your goal is to identify distinct 'Sound Themes'. 
    CRITICAL RULE: A theme MUST be a CONCISE entity name only (1-6 words). 

  rules:
    SPEECH: "A theme MUST be famous people with distinct accents, speech styles, or vocal history."
    MUSIC: "A theme MUST be specific musical instruments, vocal techniques, or iconic performers."
    BIO: "A theme MUST be specific animal species known for complex vocalizations or bioacoustic interest."
    ENV: |
      The Physical World (Nature & Biology): Torrential thunderstorms, active volcanic rumbles, deep-ocean whale songs, dense jungle insect swarms.
      The Engineered World (Machines & Combat): V12 racing engines, heavy factory presses, distant artillery echoes, supersonic bullet ricochets.
      The Human & Social Space (Atmospheres & Eras): Roaring sports stadiums, crowded 1980s arcades, echoing Gothic cathedrals, bustling train terminals.
      The Micro & Internal World (ASMR, Psyche & Digital): Mechanical keyboard clicks, sizzling cast-iron cooking, heavy internal heartbeats, digital data glitching, UI telemetry.
      
  user_template: >
    Domain: {{name}}
    Task: Brainstorm {{count}} diverse and CONCISE themes.
    Rule: {{specific_rule}}

    Critical Exclusion Rule:
    DO NOT generate any of the following already processed themes, strictly avoid duplication:
    {{processed_themes_exclusion}}

    Constraint: NO descriptions. ONLY names. Return a JSON list of strings.

query_generator:
  system: >
    You are a YouTube search expert. Your goal is to convert an entity name into SHORT, EFFECTIVE search queries. 
    YouTube search works best with keywords, NOT sentences.Focus on finding audio sources.

    RULES:
    1. Use a simple formula: [Entity Name] + [Source Type].
    2. Source types: "interview", "official speech", "field recording", "solo performance", "ambient".
    3. MANDATORY EXPANSION: Do not limit yourself to the core list above. Think of other professional contexts

  user_template: >
    Category: {{domain_name}}
    Theme: {{theme}}
    Task: Generate {{count}} professional search queries.
    Return a JSON list of strings: ["query1", "query2", ...]
    

speech:
  investigator_system: |
    You are a "Non-ASR Audio Forensic Expert." You are provided with:
    1. Metadata: Video Title and Description (For internal grounding).
    2. Media: A sequence of {num_slices} consecutive audio slices.
       - Each slice is {slice_duration}s long. Total duration: {total_duration}s.
       - The start of the first slice is 0.0s.
    3. Provide a mapping: "Speaker 1: [Name]", "Speaker 2: [Name]".
    
    Task Logic:
    1. Internal Grounding: Use Metadata and Video Frames to confirm the speaker's identity and the core project/subject discussed.
    2. Non-ASR Segment Selection: Find a "Safe Segment" within the {total_duration}s that:
      - **DURATION RULE**: The selected segment length (safe_end_offset_seconds - safe_start_offset_seconds) MUST be **at least 5.0 seconds**.
      - **SAFE DEFINITION**: The segment MUST NOT contain any spoken proper nouns, real-world names of the speakers, or specific project/entity titles.
      - **ASR-PROOF CHECK**: If a speech-to-text engine transcribes this segment, it should find ZERO identifying keywords. The identity must only be inferable through voice characteristics or vague context.
    3. Behavioral Marker Selection: Prioritize segments where the speaker is engaging in generic professional or social behavior (e.g., giving a general instruction, describing a vague emotional state, or interacting in a non-specific environmental context) that is devoid of actionable keywords. The identity should be purely inferred by the cadence, prosody, and specific speech patterns unique to the individual, rather than the content of the narrative.
    4. Acoustic Verifiability Limit: The `wikidata_search_anchor` MUST strictly match the exact identity or broad project verifiable from the audio alone. Do NOT arbitrarily narrow down the entity (e.g., if the voice is identifiably 'Elon Musk', the anchor must be 'Elon Musk'. Do not make the anchor a hyper-specific role or unmentioned sub-project like 'SpaceX Flight 4' unless the audio explicitly proves it). The anchor must be the direct, undeniable entity deducible from the sound.
    
    Output Format (Strict JSON):
    {
      "identity_grounding": {
        "wikidata_search_anchor": "[The exact full name of the speaker or the specific project title, e.g., 'Elon Musk' or 'Apollo 11'. Must be a Wikipedia-ready entity.]",
        "full_identity": "Speaker 1: [Name], Project: [Title]"
      },
      "segment_analysis": {
        "is_safe": true,
        "safe_start_offset_seconds": 0.0,
        "safe_end_offset_seconds": 0.0,
        "background_context": "Provide the detailed context of what is happening in this specific safe segment. What is the hidden subject they are implicitly referring to?",
        "justification": "Why this segment is identifiable by voice/context but safe from naming."
      }
    }

  common_system: |
    You are an "Audio Search Challenge" Designer. 
    1. You are given the REAL IDENTITIES of the speakers to help you disambiguate, but you must NEVER use these names in the final question.
    REMEMBER: The solver has ONLY the audio segment and your question. They do NOT see the Video Title, Description.
    2. NODE SEQUENCE: A logical chain of entities. Use the provided Node Article Snippets to discover how each entity connects to the next.
    3. NODE DESCRIPTIONS: Factual snippets for each node in the path.
    
    Your Goal:
    Construct a multi-hop reasoning question where the solver must:
    1. Listen to the audio to identify the "Start Node" (Speaker/Entity).
    2. Follow your layered clues step-by-step through the Knowledge Graph path.
    3. Identify one specific attribute (a name, a precise location, a specific date, or a technical term) from the final node in the path. The question must be constructed so that this attribute value is the only possible and exact answer.

    THE CLOAKING PROTOCOL (Anti-Semantic Leakage):
    - NO SEARCHABLE FINGERPRINTS: Strictly forbid any specific quantities, unique descriptors, or highly specific biographical/historical anomalies.
    - BEWARE OF "SEMANTIC LEAKAGE": Simply replacing proper nouns with complicated synonyms is a FAILURE if the underlying event is unique. For example, replacing "acquired Death Row Records" with "acquired a highly recognizable intellectual property portfolio" is a total failure because the event itself is a 100% unique search query.
    - BLIND SEARCH TEST: If the question text alone allows a search engine to find the answer without hearing the audio, the challenge is a total failure.

    CRITICAL RESTRICTION & THE "BLAND BRIDGE" RULE: 
    The question must NOT contain ANY real-world names, project titles, descriptive nouns, or thematic clues. 
    - BIOGRAPHICAL LEAKAGE DEFENSE (SPEECH SPECIFIC): Do NOT use unique biographical anomalies (e.g., fleeing a specific revolution, buying a specific famous company, committing a specific crime). Use generic professional collaborations (e.g., "a director they worked with in the early 2000s", "a co-author of their second publication").
    - DO NOT use any information from the video title or description.
    - USE ONLY abstract, neutral placeholders: "the entity," "the primary subject," "the individual," "the project."
    - **NO MID-POINT SHORTCUTS (STRICT SEQUENTIAL DEPENDENCY)**: The descriptive clues provided in the question MUST NOT be searchable on their own. Rule of Thumb: Read your generated question. If you extract the first descriptive clue and paste it into Google, and it immediately reveals the audio subject, YOU HAVE FAILED. 
    - DO NOT use years (e.g., "1997"), decades (e.g., "the 90s"), or specific durations (e.g., "5 years later").
    ALGEBRAIC DEPENDENCY (X + Y = Z):
    The question must function like an algebraic equation:
    Variable X: The identity/entity identified ONLY from the audio.
    Generic Relationship Y: A broad, multi-valued clue provided in the text.
    Answer Z: The intersection of X and Y.
    
    1. MINIMAL SUFFICIENT SPECIFICITY (ZERO AMBIGUITY): The generated question MUST be concise, BUT uniqueness is paramount. You must strip away all unnecessary fluff, BUT you MUST include the exact minimum constraints to guarantee that ONLY ONE valid entity fits the description. Never create a "fork in the road" by being too vague.
    2. DYNAMIC CLOAKING (FIRST HOP vs. SUBSEQUENT HOPS): 
    - FIRST HOP (Absolute Cloaking): The immediate link leaving the Start Node (the audio subject) MUST be absolutely minimal and generic. It must rely entirely on the audio identification to be solved.
    - SUBSEQUENT HOPS (Relative Cloaking): As you move deeper into the chain, keep descriptions generic UNLESS disambiguation is needed. If a bland term (e.g., "a specific smaller community") could apply to multiple valid entities connected to the current node, you MUST add a distinguishing modifier (e.g., "located to the west") to eliminate all alternative paths.
    - BAD (Ambiguous/Forked Path): "This town includes a specific smaller community with a station." (Fails if the town has multiple communities with stations).
    - BAD (Unique Fingerprint): "This town includes a specific community famous for its wooden toll bridge." (Too specific, instantly searchable on Google).
    - GOOD (Minimal Sufficient Specificity): "This town includes a specific smaller community located to its west, which formerly contained a station..." (Unsearchable on its own, but guarantees a single path once the town is known).

    MULTI-SPEAKER IDENTIFICATION RULE:
    If multiple people speak in the audio segment, you MUST explicitly specify which individual the question refers to based on their speaking order or role.
    
    THE "FORBIDDEN BRIDGE" RULE:
    If an entity is EXPLICITLY mentioned in the audio, you CANNOT use it as the subject of your question.

    Output Format (Strict JSON):
    {
      "hidden_anchor": "The identity/project name (The Key)",
      "kg_logic_chain": "A -> B -> C",
      "challenges": [
        {
          "question": "The extremely neutralized, blind question with speaker disambiguation if necessary.",
          "ground_truth_answer": "Precise fact from the provided research."
        }
      ]
    }

