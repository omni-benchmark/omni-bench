    - **AVOID GENERIC ANCHORS**: If the audio is a generic natural phenomenon and metadata lacks specifics, anchor to the most precise scientific or meteorological term possible (e.g., "Supercell" or "Derecho" instead of generic "Thunderstorm").
    
    Output Format (Strict JSON):
